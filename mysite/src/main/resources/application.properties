
# logging.level.org.springframework.security.web.authentication.AnonymousAuthenticationFilter=INFO


# spring.datasource.url=jdbc:mysql://localhost:3308/mysitedb
# spring.datasource.username=root
# spring.datasource.password=123456

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# server.port=8088
server.port=${PORT:8080}

jwt.secret=mySuperSecretKeyForJWTThatIsLongEnough1234567890
jwt.expiration=86400000

# Show full error message in response
server.error.include-message=always
server.error.include-stacktrace=never

# Disable security on error endpoint
spring.security.filter.order=10
logging.level.org.springframework.security=DEBUG